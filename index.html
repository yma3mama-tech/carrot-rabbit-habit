<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うさぎの勉強習慣アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;700&display=swap');

  :root {
    --cream: #FFF8F0;
    --soft-pink: #FFD6D6;
    --carrot: #FF7A2F;
    --carrot-dark: #E05A10;
    --leaf: #4CAF50;
    --bunny-pink: #FFB3C6;
    --bunny-body: #F5F0F0;
    --lavender: #E8D5F5;
    --text: #3D2B1F;
    --text-light: #7A5C4E;
    --gold: #FFD700;
    --shadow: rgba(61,43,31,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* 背景パターン */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(255,214,214,0.4) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(232,213,245,0.4) 0%, transparent 40%),
      radial-gradient(circle at 60% 10%, rgba(255,195,143,0.2) 0%, transparent 30%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    padding: 20px 0 12px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--carrot-dark);
    letter-spacing: 0.05em;
  }

  .header .subtitle {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* うさぎステージ */
  .rabbit-stage {
    background: white;
    border-radius: 28px;
    padding: 20px;
    margin: 12px 0;
    box-shadow: 0 4px 24px var(--shadow);
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 220px;
  }

  .rabbit-stage::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to top, rgba(255,214,214,0.3), transparent);
    border-radius: 0 0 28px 28px;
  }

  /* うさぎ本体（画像） */
  .rabbit-img-wrapper {
    display: inline-block;
    position: relative;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .rabbit-img-wrapper:active { transform: scale(0.95); }

  .rabbit-img {
    width: 150px;
    height: 150px;
    object-fit: contain;
    mix-blend-mode: multiply;   /* 白背景を透過させて馴染ませる */
    transition: transform 0.3s ease;
    display: block;
  }

  /* うさぎの感情アニメ */
  .rabbit-img.happy {
    animation: bunnyHappy 0.5s ease;
  }
  .rabbit-img.eating {
    animation: bunnyEat 1.2s ease;
  }
  .rabbit-img.idle {
    animation: bunnyIdle 3s ease-in-out infinite;
  }

  /* SVG後方互換 */
  .rabbit-svg { display: none; }
  .rabbit-container { display: none; }
  .carrot-overlay { display: none; }

  @keyframes bunnyIdle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  @keyframes bunnyHappy {
    0% { transform: scale(1); }
    30% { transform: scale(1.15) rotate(-5deg); }
    60% { transform: scale(1.15) rotate(5deg); }
    100% { transform: scale(1); }
  }
  @keyframes bunnyEat {
    0% { transform: translateY(0) rotate(0); }
    20% { transform: translateY(-8px) rotate(-8deg); }
    40% { transform: translateY(0) rotate(0); }
    60% { transform: translateY(-5px) rotate(5deg); }
    80% { transform: translateY(0) rotate(0); }
    100% { transform: translateY(0); }
  }

  .rabbit-message {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 8px;
    min-height: 20px;
    font-weight: 700;
    transition: all 0.3s;
  }

  .rabbit-message.excited {
    color: var(--carrot);
    font-size: 15px;
    animation: pulse 0.5s ease;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* ハート・星エフェクト */
  .effect-container {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    width: 200px;
    height: 150px;
  }

  .floating-emoji {
    position: absolute;
    font-size: 20px;
    animation: floatUp 1.2s ease forwards;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    60% { opacity: 1; transform: translateY(-60px) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(0.8); }
  }

  /* 人参カウンター */
  .carrot-bar {
    background: white;
    border-radius: 20px;
    padding: 14px 18px;
    margin: 10px 0;
    box-shadow: 0 2px 12px var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .carrot-bar .label {
    font-size: 12px;
    color: var(--text-light);
    flex: 1;
  }

  .carrot-bar .label strong {
    display: block;
    font-size: 16px;
    color: var(--carrot-dark);
    font-weight: 900;
  }

  .carrot-icons {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 160px;
  }

  .carrot-icon {
    font-size: 20px;
    animation: carrotAppear 0.3s ease;
    display: inline-block;
  }

  @keyframes carrotAppear {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .give-carrot-btn {
    background: linear-gradient(135deg, var(--carrot), var(--carrot-dark));
    color: white;
    border: none;
    border-radius: 16px;
    padding: 12px 20px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(255,122,47,0.4);
    white-space: nowrap;
  }

  .give-carrot-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,122,47,0.5); }
  .give-carrot-btn:active { transform: translateY(0); }
  .give-carrot-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 目標リスト */
  .section-title {
    font-size: 13px;
    font-weight: 900;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 16px 0 8px;
    padding-left: 4px;
  }

  .goals-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .goal-item {
    background: white;
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 2px 10px var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s;
    border: 2px solid transparent;
  }

  .goal-item.completed {
    border-color: var(--leaf);
    background: linear-gradient(135deg, #f0fdf4, white);
  }

  .goal-item.completed-anim {
    animation: goalComplete 0.5s ease;
  }

  @keyframes goalComplete {
    0% { transform: scale(1); }
    40% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .goal-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid #ddd;
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    font-size: 14px;
  }

  .goal-item.completed .goal-check {
    background: var(--leaf);
    border-color: var(--leaf);
  }

  .goal-info { flex: 1; }

  .goal-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .goal-item.completed .goal-name {
    text-decoration: line-through;
    color: var(--text-light);
  }

  .goal-meta {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .goal-streak {
    font-size: 11px;
    color: var(--carrot);
    font-weight: 700;
  }

  .goal-carrot-badge {
    background: linear-gradient(135deg, #fff5e0, #ffe0b0);
    border-radius: 10px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--carrot-dark);
    white-space: nowrap;
  }

  /* 目標追加 */
  .add-goal-area {
    margin-top: 8px;
    display: flex;
    gap: 8px;
  }

  .add-goal-input {
    flex: 1;
    border: 2px solid #e8d5c8;
    border-radius: 14px;
    padding: 10px 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-goal-input:focus { border-color: var(--carrot); }
  .add-goal-input::placeholder { color: #ccc; }

  .add-goal-btn {
    background: var(--lavender);
    border: none;
    border-radius: 14px;
    padding: 10px 16px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .add-goal-btn:hover { transform: scale(1.1); }

  /* ストーリーログ */
  .story-log {
    background: white;
    border-radius: 20px;
    padding: 14px 16px;
    margin: 10px 0;
    box-shadow: 0 2px 12px var(--shadow);
    max-height: 140px;
    overflow-y: auto;
  }

  .story-entry {
    font-size: 12px;
    color: var(--text-light);
    padding: 4px 0;
    border-bottom: 1px dashed #f0e8e0;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .story-entry:last-child { border-bottom: none; }

  .story-time {
    font-size: 10px;
    color: #ccc;
    white-space: nowrap;
    margin-top: 2px;
  }

  /* スクロールバー */
  .story-log::-webkit-scrollbar { width: 4px; }
  .story-log::-webkit-scrollbar-track { background: #f0e8e0; border-radius: 2px; }
  .story-log::-webkit-scrollbar-thumb { background: var(--bunny-pink); border-radius: 2px; }

  /* 週間カレンダー */
  .week-calendar {
    background: white;
    border-radius: 20px;
    padding: 14px 16px;
    margin: 10px 0;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .week-row {
    display: flex;
    justify-content: space-between;
    gap: 4px;
  }

  .week-day {
    flex: 1;
    text-align: center;
  }

  .week-day-name {
    font-size: 10px;
    color: var(--text-light);
    margin-bottom: 4px;
  }

  .week-day-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #f5f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    font-size: 14px;
    border: 2px solid transparent;
    transition: all 0.3s;
  }

  .week-day-dot.has-completion {
    background: linear-gradient(135deg, #fff0e0, #ffe0c0);
    border-color: var(--carrot);
  }

  .week-day-dot.today {
    border-color: var(--carrot-dark);
    box-shadow: 0 0 0 3px rgba(255,122,47,0.15);
  }

  /* トースト通知 */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    max-width: 90vw;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 飛んでくる人参アニメ */
  .flying-carrot {
    position: fixed;
    font-size: 32px;
    pointer-events: none;
    z-index: 999;
    animation: flyToRabbit 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes flyToRabbit {
    0% { transform: scale(1.5) rotate(-20deg); opacity: 1; }
    100% { transform: scale(0.3) rotate(40deg) translate(var(--tx), var(--ty)); opacity: 0; }
  }

  .goal-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .goal-action-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.15s;
    line-height: 1;
  }
  .goal-action-btn:hover { background: rgba(0,0,0,0.06); }

  .goal-edit-input {
    flex: 1;
    border: 2px solid var(--carrot);
    border-radius: 10px;
    padding: 6px 10px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    min-width: 0;
  }

  .goal-edit-btn {
    border: none;
    border-radius: 10px;
    padding: 6px 10px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .goal-edit-btn.save { background: var(--carrot); color: white; }
  .goal-edit-btn.cancel { background: #eee; color: var(--text-light); }

  .goal-item.editing { flex-wrap: wrap; gap: 6px; }

  .empty-log {
    font-size: 12px;
    color: #ccc;
    text-align: center;
    padding: 8px;
  }

  /* コレクションボタン */
  .collection-btn {
    background: linear-gradient(135deg, var(--lavender), #d4b8f0);
    border: none;
    border-radius: 20px;
    padding: 10px 18px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #6a3d9a;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 3px 10px rgba(160,100,220,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 12px auto;
    width: fit-content;
  }
  .collection-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(160,100,220,0.4); }
  .collection-badge {
    background: var(--carrot);
    color: white;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
  }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(61,43,31,0.5);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal-sheet {
    background: var(--cream);
    border-radius: 28px 28px 0 0;
    padding: 20px 16px 36px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal-sheet {
    transform: translateY(0);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
  }
  .modal-close {
    background: #f0e8e0;
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: #e0d0c8; }

  /* コレクション統計 */
  .collection-stats {
    background: white;
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 16px;
    justify-content: center;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .stat-item {
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 900;
    color: var(--carrot-dark);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* アイテムグリッド */
  .item-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .item-card {
    background: white;
    border-radius: 18px;
    padding: 14px 8px 10px;
    text-align: center;
    box-shadow: 0 2px 10px var(--shadow);
    border: 2px solid transparent;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .item-card.owned {
    border-color: var(--gold);
    background: linear-gradient(135deg, #fffbe6, white);
  }
  .item-card.owned:active { transform: scale(0.97); }
  .item-card.locked {
    background: #f8f5f2;
    opacity: 0.7;
  }
  .item-card.new-glow {
    animation: newGlow 2s ease infinite;
  }
  @keyframes newGlow {
    0%,100% { box-shadow: 0 2px 10px var(--shadow); }
    50% { box-shadow: 0 0 20px rgba(255,215,0,0.6); }
  }
  .item-emoji {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 6px;
    display: block;
  }
  .item-card.locked .item-emoji {
    filter: grayscale(1) opacity(0.3);
    font-size: 28px;
  }
  .item-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .item-card.locked .item-name {
    color: #bbb;
  }
  .item-rarity {
    font-size: 9px;
    margin-top: 3px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .rarity-common { color: #888; }
  .rarity-rare { color: #5b8dee; }
  .rarity-epic { color: #9c4de8; }
  .rarity-legendary { color: #e8a500; }

  .item-card.locked .item-hint {
    font-size: 9px;
    color: #ccc;
    margin-top: 3px;
    line-height: 1.3;
  }
  .item-new-badge {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--carrot);
    color: white;
    font-size: 8px;
    font-weight: 900;
    border-radius: 6px;
    padding: 1px 5px;
  }

  /* セクション見出し */
  .collection-section-title {
    font-size: 12px;
    font-weight: 900;
    color: var(--text-light);
    letter-spacing: 0.08em;
    margin: 12px 0 8px 4px;
  }

  /* ストリーク報酬バナー */
  .streak-reward-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    background: white;
    border-radius: 24px;
    padding: 24px 32px;
    text-align: center;
    z-index: 2000;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 280px;
    width: 80vw;
  }
  .streak-reward-banner.show {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }
  .streak-reward-banner .big-emoji { font-size: 52px; margin-bottom: 8px; display: block; }
  .streak-reward-banner .reward-title { font-size: 18px; font-weight: 900; color: var(--carrot-dark); margin-bottom: 4px; }
  .streak-reward-banner .reward-desc { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }
  .streak-reward-banner .reward-ok {
    background: linear-gradient(135deg, var(--carrot), var(--carrot-dark));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 10px 28px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* アイテムゲット演出 */
  .item-get-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    background: white;
    border-radius: 24px;
    padding: 24px 32px;
    text-align: center;
    z-index: 2000;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 280px;
    width: 80vw;
  }
  .item-get-overlay.show {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }
  .item-get-overlay .big-emoji { font-size: 56px; margin-bottom: 8px; display: block; animation: itemPop 0.5s ease 0.3s both; }
  @keyframes itemPop {
    0% { transform: scale(0) rotate(-20deg); }
    70% { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .item-get-overlay .get-label { font-size: 11px; font-weight: 700; color: var(--text-light); letter-spacing:0.1em; margin-bottom: 4px; }
  .item-get-overlay .get-name { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .item-get-overlay .get-desc { font-size: 12px; color: var(--text-light); margin-bottom: 16px; }
  .item-get-overlay .get-ok {
    background: linear-gradient(135deg, #9c4de8, #7b2fd6);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 10px 28px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .modal-dim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-dim.show { opacity: 1; pointer-events: all; }
</style>

    { id: 'drop_comet',      emoji: '☄️', name: 'すいせい',     desc: 'まばたきする間に通り過ぎた！', rarity: 'legendary', hint: '伝説級のレアアイテム', category: 'drop' },
    // マイルストーン（人参累計）
    { id: 'mile10',   emoji: '🎀', name: 'ピンクリボン',  desc: '人参10本！最初の記念品', rarity: 'common',    hint: '人参を10本あげると獲得', category: 'milestone' },
    { id: 'mile30',   emoji: '🌸', name: 'さくらの花',    desc: '人参30本達成！', rarity: 'rare',      hint: '人参を30本あげると獲得', category: 'milestone' },
    { id: 'mile100',  emoji: '🎉', name: '大パーティ！',  desc: '人参100本！すごい！', rarity: 'epic',      hint: '人参を100本あげると獲得', category: 'milestone' },
    { id: 'mile300',  emoji: '🌠', name: '流れ星',        desc: '人参300本の奇跡', rarity: 'legendary', hint: '人参を300本あげると獲得', category: 'milestone' },
  ];

  const RARITY_LABEL = { common: 'COMMON', rare: 'RARE', epic: 'EPIC', legendary: 'LEGENDARY' };
  const CATEGORY_LABEL = { streak: '🔥 ストリーク報酬', drop: '🎲 ランダムドロップ', milestone: '🥕 マイルストーン' };

  const RABBIT_MESSAGES = {
    idle: [
      '今日も一緒にがんばろうね！🌟',
      'ぼく、人参が大好き！🥕',
      'なにかお勉強した？😊',
      '毎日コツコツが大切だよ！✨',
    ],
    petted: [
      'くすぐったいよ〜！🐰',
      'もっとなでて〜！💕',
      'えへへ、うれしいな♪',
      'ふわふわ〜🌸',
    ],
    gotCarrot: [
      'わぁ！人参だ！やった〜！🥕✨',
      'もぐもぐ…あまくておいしい！😋',
      'ありがとう！大好き！💕',
      'うれしすぎてぴょんぴょんしちゃう！🐰',
      'やったー！がんばったかいがあったね！🌟',
    ],
    completed: [
      'えらいね！人参をもらう権利ゲット！🥕',
      'すごーい！やったじゃない！✨',
      'がんばったね！ぼくもうれしい！🌟',
      'お勉強おつかれさま！💪',
    ],
  };

  const STORY_EVENTS = [
    (n) => `うさぎは${n}本目の人参をうれしそうにかじった。`,
    (n) => `「${n}本の人参もらったよ！」うさぎはほっぺを赤くした。`,
    (n) => `もぐもぐ…うさぎは幸せそうに人参を食べた。`,
    (n) => `「あまい！」うさぎの目がきらきら輝いた。✨`,
    (n) => `うさぎはくるくるぴょんぴょんして喜んだ！🐰`,
  ];

  // --- Load/Save ---
  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        // 日付チェック：新しい日なら目標をリセット
        const today = getToday();
        if (parsed.lastDate !== today) {
          parsed.goals = parsed.goals.map(g => ({ ...g, completed: false }));
          parsed.pendingCarrots = 0;
          parsed.lastDate = today;
        }
        state = { ...state, ...parsed };
      }
    } catch (e) {}
    state.lastDate = getToday();
    // 新フィールドの初期化
    if (!state.ownedItems) state.ownedItems = [];
    if (!state.newItems) state.newItems = [];
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getToday() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function getTimeStr() {
    const now = new Date();
    return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  }

  // --- Render ---
  function render() {
    renderGoals();
    renderCarrots();
    renderWeek();
    renderStoryLog();
    renderCollectionBadge();
  }

  function renderGoals() {
    const list = document.getElementById('goalsList');
    list.innerHTML = '';
    state.goals.forEach(goal => {
      const div = document.createElement('div');
      div.className = 'goal-item' + (goal.completed ? ' completed' : '');
      div.id = `goal-${goal.id}`;

      if (goal._editing) {
        // 編集モード
        div.innerHTML = `
          <input class="goal-edit-input" id="edit-input-${goal.id}" value="${escapeHtml(goal.name)}" maxlength="30"
            onkeydown="if(event.key==='Enter') saveGoalEdit(${goal.id}); if(event.key==='Escape') cancelGoalEdit(${goal.id})"/>
          <button class="goal-edit-btn save" onclick="saveGoalEdit(${goal.id})">保存</button>
          <button class="goal-edit-btn cancel" onclick="cancelGoalEdit(${goal.id})">✕</button>
        `;
        setTimeout(() => {
          const inp = document.getElementById(`edit-input-${goal.id}`);
          if (inp) { inp.focus(); inp.select(); }
        }, 30);
      } else {
        // 通常表示
        div.innerHTML = `
          <div class="goal-check" onclick="toggleGoal(${goal.id})">
            ${goal.completed ? '✓' : ''}
          </div>
          <div class="goal-info">
            <div class="goal-name">${escapeHtml(goal.name)}</div>
            <div class="goal-meta">
              ${goal.streak >= 1 ? `<span class="goal-streak">🔥 ${goal.streak}日連続！</span>` : '今日挑戦'}
            </div>
          </div>
          <div class="goal-carrot-badge">🥕×1</div>
          <div class="goal-actions">
            <button class="goal-action-btn edit-btn" onclick="startGoalEdit(${goal.id})" title="編集">✏️</button>
            <button class="goal-action-btn delete-btn" id="del-${goal.id}" onclick="deleteGoal(${goal.id})" title="削除">🗑️</button>
          </div>
        `;
      }
      list.appendChild(div);
    });

    if (state.goals.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:#ccc;font-size:13px;padding:20px;">目標を追加してみよう！</div>';
    }
  }

  function startGoalEdit(id) {
    const goal = state.goals.find(g => g.id === id);
    if (!goal) return;
    // 他の編集中を閉じる
    state.goals.forEach(g => delete g._editing);
    goal._editing = true;
    renderGoals();
  }

  function saveGoalEdit(id) {
    const goal = state.goals.find(g => g.id === id);
    if (!goal) return;
    const inp = document.getElementById(`edit-input-${id}`);
    const newName = inp ? inp.value.trim() : '';
    if (!newName) return;
    const oldName = goal.name;
    goal.name = newName;
    delete goal._editing;
    addStory(`目標「${oldName}」を「${newName}」に変更した。`);
    saveState();
    render();
    showToast('目標を変更しました！');
  }

  function cancelGoalEdit(id) {
    const goal = state.goals.find(g => g.id === id);
    if (!goal) return;
    delete goal._editing;
    renderGoals();
  }

  function deleteGoal(id) {
    const btn = document.getElementById(`del-${id}`);
    if (btn && btn.dataset.confirm === '1') {
      const goal = state.goals.find(g => g.id === id);
      if (!goal) return;
      // 完了済みなら人参を戻す
      if (goal.completed && state.pendingCarrots > 0) state.pendingCarrots--;
      addStory(`目標「${goal.name}」を削除した。`);
      state.goals = state.goals.filter(g => g.id !== id);
      saveState();
      render();
      showToast('目標を削除しました');
    } else if (btn) {
      btn.textContent = '本当に削除？';
      btn.dataset.confirm = '1';
      btn.style.fontSize = '10px';
      setTimeout(() => {
        if (btn) { btn.textContent = '🗑️'; btn.style.fontSize = ''; delete btn.dataset.confirm; }
      }, 3000);
    }
  }

  function renderCarrots() {
    const countText = document.getElementById('carrotCountText');
    const icons = document.getElementById('carrotIcons');
    const btn = document.getElementById('giveCarrotBtn');

    countText.textContent = `🥕 ${state.pendingCarrots} 本`;
    icons.innerHTML = Array.from({length: Math.min(state.pendingCarrots, 8)}, () =>
      `<span class="carrot-icon">🥕</span>`).join('');
    if (state.pendingCarrots > 8) {
      icons.innerHTML += `<span style="font-size:11px;color:var(--text-light)">+${state.pendingCarrots-8}</span>`;
    }
    btn.disabled = state.pendingCarrots === 0;
  }

  function renderWeek() {
    const row = document.getElementById('weekRow');
    const today = getToday();
    const days = ['日','月','火','水','木','金','土'];
    const now = new Date();

    row.innerHTML = '';
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const isToday = dateStr === today;
      const count = state.weekData[dateStr] || 0;

      const div = document.createElement('div');
      div.className = 'week-day';
      div.innerHTML = `
        <div class="week-day-name">${days[d.getDay()]}</div>
        <div class="week-day-dot ${count > 0 ? 'has-completion' : ''} ${isToday ? 'today' : ''}">
          ${count > 0 ? '🥕' : (isToday ? '⭐' : '')}
        </div>
      `;
      row.appendChild(div);
    }
  }

  function renderStoryLog() {
    const log = document.getElementById('storyLog');
    if (state.storyLog.length === 0) {
      log.innerHTML = '<div class="empty-log">ここにうさぎのストーリーが記録されます</div>';
      return;
    }
    log.innerHTML = [...state.storyLog].reverse().slice(0, 20).map(entry => `
      <div class="story-entry">
        <span class="story-time">${entry.time}</span>
        <span>${entry.text}</span>
      </div>
    `).join('');
  }

  // --- Actions ---
  function toggleGoal(id) {
    const goal = state.goals.find(g => g.id === id);
    if (!goal) return;
    const today = getToday();

    if (!goal.completed) {
      // 完了にする
      goal.completed = true;
      state.pendingCarrots++;

      // 連続日数の計算：昨日達成していれば+1、そうでなければ1にリセット
      const yesterday = getDateStr(-1);
      if (goal.lastCompletedDate === yesterday) {
        goal.streak = (goal.streak || 0) + 1;
      } else if (goal.lastCompletedDate === today) {
        // 同日に再チェック（未完了→完了）→ストリークそのまま
      } else {
        goal.streak = 1;
      }
      goal.lastCompletedDate = today;

      // アニメ
      const items = document.querySelectorAll('.goal-item');
      const idx = state.goals.indexOf(goal);
      if (items[idx]) items[idx].classList.add('completed-anim');

      // うさぎのリアクション
      const msg = pickRandom(RABBIT_MESSAGES.completed);
      setRabbitMessage(msg, true);
      animateRabbit('happy');
      spawnEffects(['⭐','✨','💕'], 3);

      addStory(`「${goal.name}」を達成！人参1本ゲット！🥕`);
      showToast('目標達成！🥕人参1本ゲット！');

      // ストリーク報酬チェック（その目標の最大ストリーク）
      checkStreakReward(goal.streak);

      // ランダムドロップ（10%）
      if (Math.random() < 0.10) {
        const pool = ITEMS.filter(i => i.category === 'drop' && !state.ownedItems.includes(i.id));
        if (pool.length > 0) {
          // ストリーク5以上ならgem/comet重み付け
          const boosted = goal.streak >= 5 ? pool : pool.filter(i => i.id !== 'drop_gem' && i.id !== 'drop_comet');
          const chosen = boosted.length > 0 ? pickRandom(boosted) : pickRandom(pool);
          setTimeout(() => giveItem(chosen), 1200);
        }
      }

    } else {
      // 未完了に戻す
      goal.completed = false;
      if (state.pendingCarrots > 0) state.pendingCarrots--;
      // 本日のチェックを外す→ streakは今日分を戻す
      goal.streak = Math.max(0, (goal.streak || 1) - 1);
      goal.lastCompletedDate = goal.streak > 0 ? getDateStr(-1) : null;
      addStory(`「${goal.name}」を未達成に戻した。`);
    }

    saveState();
    render();
  }

  function getDateStr(offset) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function giveCarrot() {
    if (state.pendingCarrots === 0) return;

    const count = state.pendingCarrots;
    state.totalCarrotsGiven += count;
    const today = getToday();
    state.weekData[today] = (state.weekData[today] || 0) + count;
    state.pendingCarrots = 0;

    // うさぎアニメ
    animateRabbit('eating');
    const msg = pickRandom(RABBIT_MESSAGES.gotCarrot);
    setRabbitMessage(msg, true);
    spawnEffects(['🥕','💕','⭐','✨','🌟'], 8);

    // 飛んでいく人参
    launchFlyingCarrot();

    // ストーリー
    const storyFn = STORY_EVENTS[Math.floor(Math.random() * STORY_EVENTS.length)];
    addStory(storyFn(state.totalCarrotsGiven));
    addStory(`うさぎに${count}本の人参をあげた！（合計${state.totalCarrotsGiven}本）`);

    // マイルストーンチェック
    checkMilestone(state.totalCarrotsGiven);

    // ランダムドロップ（5%）
    if (Math.random() < 0.05) {
      const pool = ITEMS.filter(i => i.category === 'drop' && (i.id === 'drop_diamond' || i.id === 'drop_moon') && !state.ownedItems.includes(i.id));
      if (pool.length > 0) {
        setTimeout(() => giveItem(pickRandom(pool)), 1500);
      }
    }

    saveState();
    render();
    showToast(`🐰 うさぎに${count}本の人参をあげた！`);
  }

  function petRabbit() {
    const msg = pickRandom(RABBIT_MESSAGES.petted);
    setRabbitMessage(msg, true);
    animateRabbit('happy');
    spawnEffects(['💕','🌸'], 3);

    // クローバードロップ（7%）
    if (Math.random() < 0.07) {
      const item = ITEMS.find(i => i.id === 'drop_clover');
      if (item && !state.ownedItems.includes(item.id)) {
        setTimeout(() => giveItem(item), 800);
      }
    }
  }

  function clearStory() {
    const btn = document.getElementById('clearStoryBtn');
    if (btn.dataset.confirm === '1') {
      // 2回目：実際に消去
      state.storyLog = [];
      saveState();
      renderStoryLog();
      showToast('ストーリーを消去しました');
      btn.textContent = '消去';
      btn.style.color = 'var(--text-light)';
      btn.style.borderColor = '#ddd';
      delete btn.dataset.confirm;
    } else {
      // 1回目：確認状態に変える
      btn.textContent = '本当に消去？';
      btn.style.color = 'var(--carrot-dark)';
      btn.style.borderColor = 'var(--carrot)';
      btn.dataset.confirm = '1';
      // 3秒後に元に戻す
      setTimeout(() => {
        btn.textContent = '消去';
        btn.style.color = 'var(--text-light)';
        btn.style.borderColor = '#ddd';
        delete btn.dataset.confirm;
      }, 3000);
    }
  }

  function addGoal() {
    const input = document.getElementById('goalInput');
    const name = input.value.trim();
    if (!name) return;

    state.goals.push({ id: state.nextId++, name, completed: false, streak: 0 });
    input.value = '';
    addStory(`新しい目標「${name}」を追加した！`);
    saveState();
    render();
    showToast('目標を追加しました！');
  }

  function addStory(text) {
    state.storyLog.push({ time: getTimeStr(), text });
    if (state.storyLog.length > 50) state.storyLog.shift();
  }

  // --- UI Helpers ---
  function setRabbitMessage(msg, excited = false) {
    const el = document.getElementById('rabbitMessage');
    el.textContent = msg;
    el.className = 'rabbit-message' + (excited ? ' excited' : '');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => {
      el.className = 'rabbit-message';
      el.textContent = pickRandom(RABBIT_MESSAGES.idle);
    }, 3000);
  }

  function animateRabbit(type) {
    const img = document.getElementById('rabbitImg');
    const eatingImg = document.getElementById('rabbitEatingImg');
    const carrotOverlay = document.getElementById('carrotOverlay');

    if (type === 'eating') {
      // 食事イラストに切り替え
      if (img) img.style.display = 'none';
      if (eatingImg) {
        eatingImg.style.display = 'block';
        eatingImg.className = 'rabbit-img happy';
      }
      if (carrotOverlay) carrotOverlay.style.display = 'none';

      clearTimeout(window._eatTimer);
      window._eatTimer = setTimeout(() => {
        // 通常イラストに戻す
        if (img) { img.style.display = 'block'; img.className = 'rabbit-img idle'; }
        if (eatingImg) eatingImg.style.display = 'none';
        if (carrotOverlay) carrotOverlay.style.display = '';
      }, 2000);

    } else {
      // 通常イラストでアニメ
      if (img) {
        img.style.display = 'block';
        img.className = `rabbit-img ${type}`;
        clearTimeout(img._timer);
        img._timer = setTimeout(() => {
          img.className = 'rabbit-img idle';
        }, 600);
      }
      if (eatingImg) eatingImg.style.display = 'none';
    }
  }

  function spawnEffects(emojis, count) {
    const container = document.getElementById('effectContainer');
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (20 + Math.random() * 160) + 'px';
        el.style.top = (60 + Math.random() * 40) + 'px';
        el.style.animationDelay = (Math.random() * 0.3) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1500);
      }, i * 80);
    }
  }

  function launchFlyingCarrot() {
    const btn = document.getElementById('giveCarrotBtn');
    const rabbit = document.getElementById('rabbitSvg');
    const btnRect = btn.getBoundingClientRect();
    const rabbitRect = rabbit.getBoundingClientRect();

    const el = document.createElement('div');
    el.className = 'flying-carrot';
    el.textContent = '🥕';
    el.style.left = btnRect.left + btnRect.width / 2 + 'px';
    el.style.top = btnRect.top + 'px';

    const tx = (rabbitRect.left + rabbitRect.width / 2 - (btnRect.left + btnRect.width / 2)) + 'px';
    const ty = (rabbitRect.top + rabbitRect.height / 2 - btnRect.top) + 'px';
    el.style.setProperty('--tx', tx);
    el.style.setProperty('--ty', ty);

    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // --- ストリーク報酬 ---
  const STREAK_REWARDS = [
    { days: 3,  itemId: 'streak3',  bonus: 1, emoji: '🌟', title: '3日連続達成！', desc: '輝く星をゲット＋人参ボーナス1本！' },
    { days: 7,  itemId: 'streak7',  bonus: 2, emoji: '👑', title: '7日連続達成！！', desc: '黄金の王冠をゲット＋人参ボーナス2本！！' },
    { days: 14, itemId: 'streak14', bonus: 3, emoji: '🏆', title: '14日連続達成！！！', desc: '伝説のカップをゲット＋人参ボーナス3本！！！' },
    { days: 30, itemId: 'streak30', bonus: 5, emoji: '🌈', title: '30日連続達成！！！！', desc: '虹のかけらをゲット＋人参ボーナス5本！！！！' },
  ];

  function checkStreakReward(streak) {
    for (const reward of STREAK_REWARDS) {
      if (streak === reward.days && !state.ownedItems.includes(reward.itemId)) {
        // ボーナス人参
        state.pendingCarrots += reward.bonus;
        // アイテム付与
        giveItem(ITEMS.find(i => i.id === reward.itemId), false);
        // バナー表示
        setTimeout(() => showStreakBanner(reward), 600);
        addStory(`🔥 ${reward.days}日連続達成！特別ボーナス＋人参${reward.bonus}本！`);
        break;
      }
    }
  }

  function showStreakBanner(reward) {
    document.getElementById('streakBannerEmoji').textContent = reward.emoji;
    document.getElementById('streakBannerTitle').textContent = reward.title;
    document.getElementById('streakBannerDesc').textContent = reward.desc;
    document.getElementById('streakBanner').classList.add('show');
    document.getElementById('modalDim').classList.add('show');
    spawnEffects(['🎉','🌟','✨','🥕'], 12);
  }

  function closeStreakBanner() {
    document.getElementById('streakBanner').classList.remove('show');
    document.getElementById('modalDim').classList.remove('show');
    saveState();
    render();
  }

  // --- マイルストーン ---
  const MILESTONE_REWARDS = [
    { count: 10,  itemId: 'mile10' },
    { count: 30,  itemId: 'mile30' },
    { count: 100, itemId: 'mile100' },
    { count: 300, itemId: 'mile300' },
  ];

  function checkMilestone(total) {
    for (const m of MILESTONE_REWARDS) {
      if (total >= m.count && !state.ownedItems.includes(m.itemId)) {
        const item = ITEMS.find(i => i.id === m.itemId);
        if (item) {
          setTimeout(() => giveItem(item), 1800);
          addStory(`🎉 人参${m.count}本達成！マイルストーンアイテムゲット！`);
        }
      }
    }
  }

  // --- アイテム付与・表示 ---
  function giveItem(item, showOverlay = true) {
    if (!item) return;
    if (!state.ownedItems.includes(item.id)) {
      state.ownedItems.push(item.id);
      state.newItems.push(item.id);
      addStory(`✨ 新アイテム「${item.name}」${item.emoji}をゲット！`);
      saveState();
      renderCollectionBadge();
      if (showOverlay) {
        showItemGet(item);
      }
    }
  }

  function showItemGet(item) {
    document.getElementById('itemGetEmoji').textContent = item.emoji;
    document.getElementById('itemGetName').textContent = item.name;
    document.getElementById('itemGetDesc').textContent = item.desc;
    document.getElementById('itemGetOverlay').classList.add('show');
    document.getElementById('modalDim').classList.add('show');
    spawnEffects(['✨','💫','🌟','⭐'], 10);
  }

  function closeItemGet() {
    document.getElementById('itemGetOverlay').classList.remove('show');
    document.getElementById('modalDim').classList.remove('show');
  }

  // --- コレクションルーム ---
  function renderCollectionBadge() {
    const badge = document.getElementById('collectionBadge');
    const owned = state.ownedItems ? state.ownedItems.length : 0;
    badge.textContent = `${owned}/${ITEMS.length}`;
    if (state.newItems && state.newItems.length > 0) {
      badge.style.background = 'var(--carrot)';
      badge.textContent = `NEW!`;
    } else {
      badge.style.background = '#9c4de8';
    }
  }

  function openCollection() {
    // 新着クリア
    state.newItems = [];
    saveState();
    renderCollectionBadge();

    // 統計更新
    const owned = state.ownedItems ? state.ownedItems.length : 0;
    document.getElementById('ownedCount').textContent = owned;
    document.getElementById('totalCount').textContent = ITEMS.length;
    document.getElementById('completeRate').textContent = Math.round(owned / ITEMS.length * 100) + '%';

    // コンテンツ生成
    const content = document.getElementById('collectionContent');
    const categories = ['streak', 'drop', 'milestone'];
    content.innerHTML = categories.map(cat => {
      const catItems = ITEMS.filter(i => i.category === cat);
      return `
        <div class="collection-section-title">${CATEGORY_LABEL[cat]}</div>
        <div class="item-grid">
          ${catItems.map(item => {
            const isOwned = state.ownedItems && state.ownedItems.includes(item.id);
            const isNew = state.newItems && state.newItems.includes(item.id);
            return `
              <div class="item-card ${isOwned ? 'owned' : 'locked'}${isNew ? ' new-glow' : ''}">
                ${isNew ? '<span class="item-new-badge">NEW</span>' : ''}
                <span class="item-emoji">${isOwned ? item.emoji : '❓'}</span>
                <div class="item-name">${isOwned ? item.name : '？？？'}</div>
                <div class="item-rarity rarity-${item.rarity}">${RARITY_LABEL[item.rarity]}</div>
                ${!isOwned ? `<div class="item-hint">${item.hint}</div>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }).join('');

    document.getElementById('collectionModal').classList.add('open');
  }

  function closeCollection() {
    document.getElementById('collectionModal').classList.remove('open');
  }

  function closeCollectionOutside(e) {
    if (e.target === document.getElementById('collectionModal')) closeCollection();
  }

  // --- Init ---
  loadState();
  render();

  // 最初のメッセージをランダムに
  setTimeout(() => {
    setRabbitMessage(pickRandom(RABBIT_MESSAGES.idle));
  }, 500);
</script>
</body>
</html>
